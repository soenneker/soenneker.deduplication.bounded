name: build-and-test
on:
  # Testing - run for any PRs.
  pull_request:
    branches:
      - main

env:
    "PipelineEnvironment": true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tests
        run: dotnet restore test/Soenneker.Deduplication.Bounded.Tests/Soenneker.Deduplication.Bounded.Tests.csproj --verbosity minimal

      - name: Build tests
        run: dotnet build test/Soenneker.Deduplication.Bounded.Tests/Soenneker.Deduplication.Bounded.Tests.csproj --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test test/Soenneker.Deduplication.Bounded.Tests/Soenneker.Deduplication.Bounded.Tests.csproj --configuration Release --no-build --no-restore --verbosity normal

      - name: Restore library
        run: dotnet restore src/Soenneker.Deduplication.Bounded/Soenneker.Deduplication.Bounded.csproj --verbosity minimal

      - name: Build library
        run: dotnet build src/Soenneker.Deduplication.Bounded/Soenneker.Deduplication.Bounded.csproj --configuration Release --no-restore --verbosity minimal

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts
          dotnet pack src/Soenneker.Deduplication.Bounded/Soenneker.Deduplication.Bounded.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --output ./artifacts
